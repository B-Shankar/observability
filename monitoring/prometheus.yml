global:
  scrape_interval: 10s

rule_files:
  - "alert-rules.yml"

alerting:

  alertmanagers:

    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:

  - job_name: 'order-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.1.8:8083']

  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.1.8:8081']

  - job_name: 'product-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['192.168.1.8:8082']