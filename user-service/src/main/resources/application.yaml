server:
  port: 8081
  address: 0.0.0.0

spring:
  application:
    name: user-service

  h2:
    console:
      enabled: true

  datasource:
    url: jdbc:h2:mem:userdb

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId}] %-5level %logger{36} - %msg%n"